<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pubdokpim Hub - Hybrid Style</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- SheetJS for XLSX Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f1f5f9; 
            color: #1e293b;
            overflow-x: hidden; 
        }

        .sidebar-dark { background-color: #0f172a; color: #94a3b8; }
        .sidebar-active { 
            background: rgba(59, 130, 246, 0.1); 
            color: #3b82f6; 
            border-right: 4px solid #3b82f6; 
        }

        .loader { border-top-color: #3b82f6; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .btn-process { pointer-events: none; opacity: 0.5; }

        .custom-select { 
            appearance: none; 
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2364748b' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e"); 
            background-position: right 0.75rem center; 
            background-repeat: no-repeat; 
            background-size: 1.2em 1.2em; 
        }

        .gallery-card { 
            background: #ffffff;
            border: 1px solid #e2e8f0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        .gallery-card:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.05); 
            border-color: #cbd5e1;
        }

        .swal-custom-popup { border-radius: 24px !important; padding: 1.5rem !important; }
        .swal-custom-image { border-radius: 16px !important; object-fit: contain !important; max-height: 70vh !important; }
    </style>
</head>
<body class="selection:bg-blue-100">

    <!-- LOADING OVERLAY -->
    <div id="loadingOverlay" class="fixed inset-0 z-[9999] bg-[#f1f5f9] flex flex-col items-center justify-center transition-opacity duration-300">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-200 h-12 w-12 mb-4"></div>
        <p id="loadingText" class="text-slate-600 font-bold text-sm tracking-widest uppercase">Pubdokpim Hub</p>
        <p class="text-slate-400 text-[10px] mt-2 italic">Menghubungkan ke server...</p>
    </div>

    <!-- MAIN APP CONTAINER -->
    <div id="app" class="min-h-screen"></div>

    <script>
        // --- GLOBAL STATE ---
        let currentUser = JSON.parse(localStorage.getItem('pubdok_user')) || null;
        let currentView = currentUser ? (currentUser.role === 'admin' ? 'dashboard' : 'gallery') : 'login';
        let galleryData = [];
        let dashboardStats = { recentLogs: [] };
        let activePhotos = [];
        let selectedFolder = null;
        
        // Helper function to get time with colon separator
        function getFormattedTime() {
            const now = new Date();
            const pad = (num) => num.toString().padStart(2, '0');
            return `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
        }
        
        let lastSyncTime = getFormattedTime();
        
        let filterYear = 'Semua';
        let filterMonth = 'Semua';
        let dashboardYearFilter = new Date().getFullYear().toString();

        const MONTHS = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];

        // --- UTILS ---
        function startLoading(text = "Memproses...") {
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) overlay.classList.remove('hidden', 'opacity-0');
            document.getElementById('loadingText').innerText = text;
            document.querySelectorAll('button').forEach(btn => btn.classList.add('btn-process'));
        }

        function endLoading() {
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) {
                overlay.classList.add('opacity-0');
                setTimeout(() => overlay.classList.add('hidden'), 300);
            }
            document.querySelectorAll('button').forEach(btn => btn.classList.remove('btn-process'));
        }

        function showAlert(title, text, icon) {
            Swal.fire({ title, text, icon, confirmButtonColor: '#2563eb', borderRadius: '20px' });
        }

        // --- CORE LOGIC ---
        function handleLogin(e) {
            e.preventDefault();
            const username = e.target.username.value;
            const password = e.target.password.value;
            startLoading("Memverifikasi...");
            if (typeof google === 'undefined') {
                setTimeout(() => {
                    endLoading();
                    if ((username === 'admin' || username === 'user') && password === 'Demo2026!') {
                        saveSession({ username, nama: username === 'admin' ? 'Admin Pubdok' : 'User Tamu', role: username });
                    } else showAlert("Gagal", "Username/Password salah.", "error");
                }, 800);
            } else {
                google.script.run
                    .withSuccessHandler(res => {
                        endLoading();
                        if(res.success) saveSession(res.user);
                        else showAlert("Gagal", res.message, "error");
                    })
                    .withFailureHandler(err => { endLoading(); showAlert("Error", err.message, "error"); })
                    .loginUser({username, password});
            }
        }

        function saveSession(user) {
            currentUser = user;
            localStorage.setItem('pubdok_user', JSON.stringify(user));
            currentView = user.role === 'admin' ? 'dashboard' : 'gallery';
            initApp();
        }

        function handleLogout() {
            localStorage.removeItem('pubdok_user');
            currentUser = null;
            currentView = 'login';
            initApp();
        }

        function initApp() {
            renderApp();
            if(currentUser) {
                if(currentUser.role === 'admin') loadDashboard();
                loadGallery();
            } else {
                endLoading();
            }
        }

        function loadGallery() {
            startLoading("Sinkronisasi...");
            if (typeof google === 'undefined') {
                setTimeout(() => {
                    galleryData = [
                        { id:'1', nama_kegiatan:'Rapat Paripurna DPRD', tahun:'2025', bulan:'Maret', tanggal:'04', link_drive:'#', folder_id:'123' },
                        { id:'2', nama_kegiatan:'Kunjungan Lapangan Gubernur', tahun:'2025', bulan:'Februari', tanggal:'15', link_drive:'#', folder_id:'456' }
                    ];
                    lastSyncTime = getFormattedTime();
                    endLoading(); renderApp();
                }, 500);
            } else {
                google.script.run
                    .withSuccessHandler(res => { 
                        endLoading(); 
                        galleryData = res; 
                        lastSyncTime = getFormattedTime();
                        renderApp(); 
                    })
                    .getGalleryData();
            }
        }

        function loadDashboard() {
            if (typeof google === 'undefined') {
                setTimeout(() => { dashboardStats = { recentLogs: [] }; renderApp(); }, 500);
            } else {
                google.script.run.withSuccessHandler(res => { dashboardStats = res; renderApp(); }).getDashboardData();
            }
        }

        function handleConnect(e) {
            e.preventDefault();
            const payload = {
                nama_kegiatan: e.target.nama_kegiatan.value,
                tahun: e.target.tahun.value,
                bulan: e.target.bulan.value,
                tanggal: e.target.tanggal.value,
                link: e.target.link_drive.value,
                addedBy: currentUser.nama
            };
            startLoading("Integrasi Drive...");
            if (typeof google === 'undefined') {
                setTimeout(() => { 
                    galleryData.push({...payload, id:Date.now()}); 
                    endLoading(); showAlert("Berhasil", "Data tersimpan!", "success"); 
                    currentView='gallery'; renderApp(); 
                }, 1000);
            } else {
                google.script.run
                    .withSuccessHandler(res => {
                        endLoading();
                        if(res.success) { showAlert("Berhasil", "Integrasi sukses!", "success"); currentView='gallery'; loadGallery(); }
                        else showAlert("Gagal", res.message, "error");
                    })
                    .saveFolderLink(payload);
            }
        }

        function openFolder(folder) {
            selectedFolder = folder;
            startLoading("Memuat Foto...");
            if (typeof google === 'undefined') {
                setTimeout(() => {
                    activePhotos = [{ id:'1', name:'Dokumentasi 1', thumbnail:'https://picsum.photos/400/300', viewUrl:'https://picsum.photos/1200/800', downloadUrl: '#' }];
                    endLoading(); currentView = 'photo_view'; renderApp();
                }, 800);
            } else {
                google.script.run
                    .withSuccessHandler(res => {
                        endLoading();
                        if(res.success) { activePhotos = res.files; currentView = 'photo_view'; renderApp(); }
                        else showAlert("Gagal", res.message, "error");
                    })
                    .getFilesFromFolder(folder.folder_id);
            }
        }

        /**
         * EXPORT TO SPREADSHEET (XLSX)
         */
        function exportToSpreadsheet() {
            const filtered = galleryData.filter(i => (filterYear === 'Semua' || i.tahun == filterYear) && (filterMonth === 'Semua' || i.bulan == filterMonth));
            if (filtered.length === 0) return showAlert("Informasi", "Tidak ada data untuk diekspor", "info");

            // Map data for export
            const dataToExport = filtered.map((item, index) => ({
                "No.": index + 1,
                "Nama Kegiatan": item.nama_kegiatan,
                "Tanggal Kegiatan": `${item.tanggal}-${item.bulan}-${item.tahun}`,
                "Link Dokumentasi": item.link_drive
            }));

            // Create Worksheet
            const ws = XLSX.utils.json_to_sheet(dataToExport);
            
            // Set Column Widths for better readability
            const wscols = [
                {wch: 5},  // No.
                {wch: 40}, // Nama Kegiatan
                {wch: 25}, // Tanggal Kegiatan
                {wch: 50}  // Link Dokumentasi
            ];
            ws['!cols'] = wscols;

            // Create Workbook
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Arsip Galeri");

            // Generate Filename
            const fileName = `Data_Arsip_Pubdokpim_${filterYear}_${filterMonth}.xlsx`;

            // Export to File
            XLSX.writeFile(wb, fileName);
        }

        // --- CHART LOGIC ---
        function initDashboardChart() {
            const ctx = document.getElementById('monthlyChart');
            if (!ctx) return;

            const monthlyCounts = new Array(12).fill(0);
            galleryData.forEach(item => {
                if (item.tahun.toString() === dashboardYearFilter.toString()) {
                    const monthIndex = MONTHS.indexOf(item.bulan);
                    if (monthIndex !== -1) monthlyCounts[monthIndex]++;
                }
            });

            // Destroy existing chart if it exists to avoid overlap
            if (window.myDashboardChart) {
                window.myDashboardChart.destroy();
            }

            window.myDashboardChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: MONTHS.map(m => m.substring(0, 3)),
                    datasets: [{
                        label: 'Dokumen Upload',
                        data: monthlyCounts,
                        backgroundColor: '#3b82f6',
                        borderRadius: 8,
                        borderSkipped: false,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { 
                            beginAtZero: true, 
                            grid: { display: false }, 
                            ticks: { 
                                stepSize: 1,
                                precision: 0 
                            } 
                        },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        // --- RENDERERS ---
        function renderApp() {
            const container = document.getElementById('app');
            if (currentView === 'login') {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center min-h-screen p-6 bg-[#f1f5f9]">
                        <div class="w-full max-w-md bg-white rounded-[2.5rem] shadow-xl p-10 border border-slate-200">
                            <div class="text-center mb-10">
                                <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-6 text-white shadow-lg"><i data-lucide="camera"></i></div>
                                <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Pubdokpim Hub</h1>
                                <p class="text-slate-600 mt-1 font-bold text-sm">Pusat Dokumentasi Digital</p>
                                <p class="text-slate-400 mt-0.5 font-medium text-[11px] uppercase tracking-wider">Cabang Dinas Pendidikan Wilayah Pasuruan</p>
                            </div>
                            <form onsubmit="handleLogin(event)" class="space-y-4">
                                <input name="username" type="text" placeholder="Username" required class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-blue-500 transition-all text-sm">
                                <input name="password" type="password" placeholder="Password" required class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-blue-500 transition-all text-sm">
                                <button type="submit" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-bold transition-all uppercase tracking-widest text-xs mt-2">Masuk Portal</button>
                            </form>
                        </div>
                        <div class="mt-8 text-center">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">© 2026 Cabang Dinas Pendidikan Wilayah Pasuruan</p>
                        </div>
                    </div>`;
            } else {
                container.innerHTML = `
                    <div class="w-64 sidebar-dark h-screen fixed top-0 left-0 z-50 hidden md:block shadow-2xl">
                        <div class="p-8 border-b border-slate-800 flex items-center gap-3">
                            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white"><i data-lucide="database" class="w-4 h-4"></i></div>
                            <span class="font-bold text-lg text-white">Pubdokpim Hub</span>
                        </div>
                        <nav class="p-4 space-y-1 mt-4">
                            ${currentUser.role === 'admin' ? `
                                <button onclick="currentView='dashboard'; renderApp()" class="w-full text-left px-5 py-4 rounded-xl flex items-center gap-4 transition-all ${currentView === 'dashboard' ? 'sidebar-active' : 'hover:bg-slate-800'}">
                                    <i data-lucide="layout-dashboard" class="w-4 h-4"></i><span class="font-bold text-xs">DASHBOARD</span>
                                </button>
                                <button onclick="currentView='gallery'; renderApp()" class="w-full text-left px-5 py-4 rounded-xl flex items-center gap-4 transition-all ${currentView === 'gallery' ? 'sidebar-active' : 'hover:bg-slate-800'}">
                                    <i data-lucide="archive" class="w-4 h-4"></i><span class="font-bold text-xs">ARSIP GALERI</span>
                                </button>
                                <button onclick="currentView='connect'; renderApp()" class="w-full text-left px-5 py-4 rounded-xl flex items-center gap-4 transition-all ${currentView === 'connect' ? 'sidebar-active' : 'hover:bg-slate-800'}">
                                    <i data-lucide="link" class="w-4 h-4"></i><span class="font-bold text-xs">INTEGRASI DRIVE</span>
                                </button>
                            ` : `
                                <button onclick="currentView='gallery'; renderApp()" class="w-full text-left px-5 py-4 rounded-xl flex items-center gap-4 sidebar-active">
                                    <i data-lucide="image" class="w-4 h-4"></i><span class="font-bold text-xs">GALERI FOTO</span>
                                </button>
                            `}
                        </nav>
                        <div class="absolute bottom-6 left-4 right-4">
                            <button onclick="handleLogout()" class="w-full py-3 bg-slate-800 text-slate-400 hover:text-white rounded-xl font-bold text-[10px] uppercase tracking-widest flex items-center justify-center gap-3 transition-all border border-slate-700">
                                <i data-lucide="log-out" class="w-4 h-4"></i> Logout
                            </button>
                        </div>
                    </div>

                    <div class="md:ml-64 min-h-screen flex flex-col">
                        <header class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-200 px-8 flex items-center justify-between sticky top-0 z-40">
                            <h2 class="font-black text-slate-400 text-[10px] uppercase tracking-widest">${currentView.replace('_', ' ')}</h2>
                            <div class="flex items-center gap-4">
                                <div class="text-right hidden sm:block">
                                    <p class="text-xs font-bold text-slate-900">${currentUser.nama}</p>
                                    <p class="text-[9px] text-blue-600 font-bold uppercase tracking-widest">${currentUser.role}</p>
                                </div>
                                <div class="w-10 h-10 bg-slate-100 rounded-xl flex items-center justify-center text-slate-400 border border-slate-200"><i data-lucide="user" class="w-4 h-4"></i></div>
                            </div>
                        </header>
                        <main id="viewContent" class="flex-grow">${renderView()}</main>
                        <footer class="py-6 text-center border-t border-slate-200 bg-white/50">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">© 2026 Cabang Dinas Pendidikan Wilayah Pasuruan</p>
                        </footer>
                    </div>`;
            }
            lucide.createIcons();
            if (currentView === 'dashboard') initDashboardChart();
        }

        function renderView() {
            switch(currentView) {
                case 'dashboard':
                    const now = new Date();
                    const currentMonthName = MONTHS[now.getMonth()];
                    const currentYear = now.getFullYear().toString();
                    
                    const yearsInDB = [...new Set(galleryData.map(i => i.tahun.toString()))].sort().reverse();
                    
                    // Filter logic for current view and chart
                    const countThisYear = galleryData.filter(i => i.tahun.toString() === dashboardYearFilter.toString()).length;
                    const countThisMonth = galleryData.filter(i => i.tahun.toString() === currentYear && i.bulan === currentMonthName).length;
                    
                    return `
                        <div class="p-8 space-y-8">
                            <!-- Welcome Banner -->
                            <div class="bg-gradient-to-r from-blue-600 to-indigo-700 rounded-[2rem] p-8 text-white shadow-xl shadow-blue-200/50 flex flex-col md:flex-row justify-between items-center gap-6">
                                <div class="text-center md:text-left">
                                    <h3 class="text-2xl font-bold">Halo, ${currentUser.nama}! 👋</h3>
                                    <p class="text-blue-100 mt-1 opacity-90">Selamat datang kembali di panel kendali Pubdokpim Hub.</p>
                                </div>
                                <div class="flex items-center gap-2 bg-white/10 px-4 py-2 rounded-2xl backdrop-blur-md">
                                    <i data-lucide="calendar" class="w-4 h-4"></i>
                                    <span class="text-sm font-bold">${currentMonthName} ${currentYear}</span>
                                </div>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                <div class="bg-white p-8 rounded-[2rem] border border-slate-200 shadow-sm flex flex-col justify-between">
                                    <div class="flex justify-between items-start">
                                        <div class="w-10 h-10 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center"><i data-lucide="folder" class="w-5 h-5"></i></div>
                                        <select onchange="dashboardYearFilter=this.value; renderApp()" class="custom-select text-[10px] font-bold bg-slate-50 border border-slate-200 rounded-lg py-1 px-4 outline-none">
                                            ${yearsInDB.map(y => `<option value="${y}" ${dashboardYearFilter == y ? 'selected' : ''}>Tahun ${y}</option>`).join('')}
                                            ${yearsInDB.length === 0 ? `<option>${currentYear}</option>` : ''}
                                        </select>
                                    </div>
                                    <div class="mt-6">
                                        <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Arsip Tahun ${dashboardYearFilter}</p>
                                        <h3 class="text-4xl font-bold text-slate-800 mt-1">${countThisYear} <span class="text-xs font-medium text-slate-400 uppercase tracking-normal">Kegiatan</span></h3>
                                    </div>
                                </div>

                                <div class="bg-white p-8 rounded-[2rem] border border-slate-200 shadow-sm flex flex-col justify-between">
                                    <div class="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center"><i data-lucide="bar-chart-2" class="w-5 h-5"></i></div>
                                    <div class="mt-6">
                                        <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Arsip Bulan Ini (${currentMonthName})</p>
                                        <h3 class="text-4xl font-bold text-slate-800 mt-1">${countThisMonth} <span class="text-xs font-medium text-slate-400 uppercase tracking-normal">Kegiatan</span></h3>
                                    </div>
                                </div>

                                <div class="bg-blue-600 p-8 rounded-[2rem] text-white shadow-xl shadow-blue-200 flex flex-col justify-center">
                                    <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center mb-4"><i data-lucide="refresh-cw" class="w-5 h-5"></i></div>
                                    <p class="text-white/60 text-[10px] font-bold uppercase tracking-widest">Status Sinkronisasi Data</p>
                                    <h3 class="text-xl font-bold">Sinkron: ${lastSyncTime}</h3>
                                </div>
                            </div>

                            <!-- Quick Access Sections -->
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <button onclick="currentView='gallery'; renderApp()" class="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm hover:shadow-md transition-all flex items-center gap-5 group">
                                    <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center group-hover:bg-blue-600 group-hover:text-white transition-all"><i data-lucide="image" class="w-6 h-6"></i></div>
                                    <div class="text-left">
                                        <h4 class="font-bold text-sm text-slate-800">Akses Galeri</h4>
                                        <p class="text-[10px] text-slate-400 font-medium uppercase tracking-widest mt-0.5">Lihat Koleksi Foto</p>
                                    </div>
                                    <i data-lucide="chevron-right" class="w-4 h-4 ml-auto text-slate-300"></i>
                                </button>
                                <button onclick="currentView='connect'; renderApp()" class="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm hover:shadow-md transition-all flex items-center gap-5 group">
                                    <div class="w-12 h-12 bg-green-50 text-green-600 rounded-2xl flex items-center justify-center group-hover:bg-green-600 group-hover:text-white transition-all"><i data-lucide="plus-circle" class="w-6 h-6"></i></div>
                                    <div class="text-left">
                                        <h4 class="font-bold text-sm text-slate-800">Integrasi Drive</h4>
                                        <p class="text-[10px] text-slate-400 font-medium uppercase tracking-widest mt-0.5">Tambah Arsip Baru</p>
                                    </div>
                                    <i data-lucide="chevron-right" class="w-4 h-4 ml-auto text-slate-300"></i>
                                </button>
                            </div>

                            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                <!-- Chart Area -->
                                <div class="bg-white rounded-[2rem] border border-slate-200 p-8 shadow-sm">
                                    <div class="flex justify-between items-center mb-6">
                                        <h4 class="font-bold text-xs uppercase text-slate-500 tracking-widest">Statistik Bulanan (${dashboardYearFilter})</h4>
                                    </div>
                                    <div class="h-64">
                                        <canvas id="monthlyChart"></canvas>
                                    </div>
                                </div>

                                <!-- Mini Log Area (Limited to 5 rows) -->
                                <div class="bg-white rounded-[2rem] border border-slate-200 overflow-hidden shadow-sm flex flex-col">
                                    <div class="px-8 py-5 border-b border-slate-100 font-bold text-xs uppercase text-slate-500 tracking-widest">Log Aktivitas Tim</div>
                                    <div class="overflow-x-auto flex-grow">
                                        <table class="w-full text-left">
                                            <thead class="bg-slate-50 text-slate-400 text-[9px] font-bold uppercase tracking-widest"><tr><th class="px-8 py-4">Waktu</th><th class="px-8 py-4">User</th><th class="px-8 py-4">Aktivitas</th></tr></thead>
                                            <tbody class="divide-y divide-slate-50">
                                                ${dashboardStats.recentLogs.slice(0, 5).map(l => `
                                                    <tr class="text-xs text-slate-600">
                                                        <td class="px-8 py-4">${l.time}</td>
                                                        <td class="px-8 py-4 font-bold text-slate-800">${l.user}</td>
                                                        <td class="px-8 py-4">${l.activity}</td>
                                                    </tr>`).join('')}
                                                ${dashboardStats.recentLogs.length === 0 ? '<tr><td colspan="3" class="px-8 py-10 text-center text-slate-300 text-xs font-medium italic">Belum ada aktivitas</td></tr>' : ''}
                                            </tbody>
                                        </table>
                                    </div>
                                    <div class="px-8 py-3 bg-slate-50 border-t border-slate-100 flex justify-between items-center">
                                        <span class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Menampilkan 5 Data Terakhir</span>
                                    </div>
                                </div>
                            </div>
                        </div>`;
                
                case 'gallery':
                    const filtered = galleryData.filter(i => (filterYear === 'Semua' || i.tahun == filterYear) && (filterMonth === 'Semua' || i.bulan == filterMonth));
                    const years = [...new Set(galleryData.map(i => i.tahun))].sort().reverse();
                    return `
                        <div class="p-8 space-y-8">
                            <div class="flex flex-col md:flex-row md:items-end justify-between gap-6">
                                <div><h2 class="text-2xl font-bold text-slate-800">Arsip Galeri</h2><p class="text-slate-500 text-sm mt-1">Daftar liputan dokumentasi tim Pubdokpim.</p></div>
                                <div class="flex flex-wrap gap-2 items-center">
                                    <select onchange="filterYear=this.value; renderApp()" class="custom-select bg-white border border-slate-200 rounded-xl px-4 py-2 text-[10px] font-bold outline-none uppercase tracking-widest">
                                        <option value="Semua">Tahun</option>
                                        ${years.map(y => `<option value="${y}" ${filterYear==y?'selected':''}>${y}</option>`).join('')}
                                    </select>
                                    <select onchange="filterMonth=this.value; renderApp()" class="custom-select bg-white border border-slate-200 rounded-xl px-4 py-2 text-[10px] font-bold outline-none uppercase tracking-widest">
                                        <option value="Semua">Bulan</option>
                                        ${MONTHS.map(m => `<option value="${m}" ${filterMonth==m?'selected':''}>${m}</option>`).join('')}
                                    </select>
                                    ${currentUser.role === 'admin' ? `
                                        <button onclick="exportToSpreadsheet()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-widest flex items-center gap-2 transition-all">
                                            <i data-lucide="file-spreadsheet" class="w-4 h-4"></i> Export Excel (.xlsx)
                                        </button>
                                    ` : ''}
                                </div>
                            </div>
                            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
                                ${filtered.map(item => `
                                    <div class="gallery-card rounded-3xl p-6 flex flex-col justify-between h-48">
                                        <div>
                                            <div class="flex justify-between items-start mb-3">
                                                <span class="text-[9px] font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded-lg uppercase tracking-widest">${item.tahun}</span>
                                                <span class="text-[9px] font-bold text-slate-400 uppercase">${item.tanggal} ${item.bulan}</span>
                                            </div>
                                            <h4 class="font-bold text-slate-800 text-sm leading-tight line-clamp-2">${item.nama_kegiatan}</h4>
                                        </div>
                                        <div class="flex gap-2">
                                            <button onclick='openFolder(${JSON.stringify(item)})' class="flex-grow py-3 bg-slate-900 text-white rounded-xl text-[10px] font-bold uppercase tracking-widest hover:bg-blue-600 transition-all">Lihat Foto</button>
                                            <button onclick="shareWA('${item.link_drive}', '${item.nama_kegiatan}')" class="px-3 bg-slate-100 text-slate-400 hover:text-green-600 rounded-xl transition-all"><i data-lucide="share-2" class="w-4 h-4"></i></button>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>`;

                case 'connect':
                    return `
                        <div class="p-8 flex justify-center">
                            <div class="w-full max-w-lg bg-white p-10 rounded-[2.5rem] border border-slate-200 shadow-sm space-y-8">
                                <div class="text-center"><h3 class="text-xl font-bold text-slate-800">Hubungkan Drive</h3><p class="text-slate-400 text-sm mt-1">Registrasi folder liputan baru.</p></div>
                                <form onsubmit="handleConnect(event)" class="space-y-5">
                                    <div class="space-y-1">
                                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-2">Nama Kegiatan</label>
                                        <input name="nama_kegiatan" type="text" placeholder="..." required class="w-full px-5 py-3 bg-slate-50 border border-slate-200 rounded-2xl outline-none text-sm focus:border-blue-500">
                                    </div>
                                    <div class="grid grid-cols-3 gap-3">
                                        <div class="space-y-1">
                                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-2">Tgl</label>
                                            <input name="tanggal" type="number" placeholder="01" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-2xl outline-none text-sm text-center">
                                        </div>
                                        <div class="space-y-1">
                                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-2">Bulan</label>
                                            <select name="bulan" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-2xl outline-none text-sm custom-select uppercase font-bold text-[10px]">${MONTHS.map(m => `<option value="${m}">${m}</option>`).join('')}</select>
                                        </div>
                                        <div class="space-y-1">
                                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-2">Tahun</label>
                                            <input name="tahun" value="2025" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-2xl outline-none text-sm text-center">
                                        </div>
                                    </div>
                                    <input name="link_drive" type="url" placeholder="Link Google Drive" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none text-sm focus:border-blue-500">
                                    <button type="submit" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-lg shadow-blue-100 hover:bg-blue-700 transition-all uppercase tracking-widest text-xs mt-4">Simpan Integrasi</button>
                                </form>
                            </div>
                        </div>`;

                case 'photo_view':
                    return `
                        <div class="p-8">
                            <button onclick="currentView='gallery'; renderApp()" class="mb-6 flex items-center gap-2 font-bold text-slate-400 hover:text-blue-600 transition-all text-[10px] tracking-widest uppercase"><i data-lucide="chevron-left" class="w-4 h-4"></i> Katalog</button>
                            <div class="flex flex-col md:flex-row md:items-end justify-between gap-4 mb-10 pb-6 border-b border-slate-200">
                                <div><h2 class="text-2xl font-bold text-slate-800 leading-tight">${selectedFolder.nama_kegiatan}</h2><p class="text-slate-400 text-xs font-bold mt-1 uppercase tracking-widest">${selectedFolder.tanggal} ${selectedFolder.bulan} ${selectedFolder.tahun}</p></div>
                                <button onclick="window.open('${selectedFolder.link_drive}', '_blank')" class="px-5 py-3 bg-slate-100 border border-slate-200 rounded-2xl text-[10px] font-bold uppercase tracking-widest hover:bg-white transition-all">G-Drive</button>
                            </div>
                            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
                                ${activePhotos.map(p => `
                                    <div class="aspect-square relative rounded-[1.5rem] overflow-hidden bg-white border border-slate-200 shadow-sm cursor-pointer group">
                                        <img src="${p.thumbnail}" class="w-full h-full object-cover transition-all group-hover:scale-110" loading="lazy">
                                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-all flex items-center justify-center gap-3">
                                            <button onclick="popupPhoto('${p.viewUrl}', '${p.name}', '${p.downloadUrl}')" class="p-3 bg-white/20 hover:bg-white/40 backdrop-blur-md rounded-xl text-white transition-all">
                                                <i data-lucide="maximize" class="w-5 h-5"></i>
                                            </button>
                                            <button onclick="window.open('${p.downloadUrl}', '_blank')" class="p-3 bg-blue-600 hover:bg-blue-700 rounded-xl text-white shadow-lg transition-all">
                                                <i data-lucide="download" class="w-5 h-5"></i>
                                            </button>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>`;
                
                default: return ``;
            }
        }

        function shareWA(link, nama) {
            const text = encodeURIComponent(`Berikut link dokumentasi foto kegiatan: ${nama}\nLink: ${link}`);
            window.open(`https://wa.me/?text=${text}`, '_blank');
        }

        function popupPhoto(url, title, downloadUrl) {
            let id = url.split('id=')[1]?.split('&')[0];
            const finalUrl = id ? `https://drive.google.com/thumbnail?id=${id}&sz=w1200` : url;
            
            Swal.fire({ 
                title: `<span class="text-[10px] font-bold uppercase tracking-widest text-slate-400">${title}</span>`, 
                imageUrl: finalUrl, 
                imageAlt: title, 
                width: 'auto', 
                padding: '1rem',
                showConfirmButton: false, 
                showCloseButton: true, 
                customClass: { popup: 'swal-custom-popup', image: 'swal-custom-image' },
                background: '#fff',
                backdrop: 'rgba(15, 23, 42, 0.9)',
                didOpen: () => {
                    const img = document.querySelector('.swal2-image');
                    if (img) img.onerror = () => { img.src = 'https://via.placeholder.com/800x600?text=Gambar+Gagal+Dimuat'; };
                    lucide.createIcons();
                }
            });
        }

        window.onload = initApp;
    </script>
</body>
</html>
